<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            position: absolute;
            top: 50%;
            left: 50%; 
            transform: translate(-50%, -50%);
            border-color: black;
            font-family: 'Times New Roman', Times, serif;
        }
        #maytinh{
            width: 275px;
            height: 440px;
            padding-left: 20px; 
            padding-top: 20px;
            border: 1px solid black;
            background-color: rgb(243, 230, 230);
        }
        #manhinh{
            padding-bottom: 20px; 
            text-align: right;
            font-size: 50px;
            width: 250px;
        }
        input{
            font-size: 30px;
            width: 60px;
            height: 60px;
            cursor: pointer;
        }
        #ketqua{
            background-color: rgb(108, 108, 238);
            color: aliceblue;
        }
    </style>
</head>
<body>
    <form id="maytinh">
        <table>
            <tr><input type="text" id="manhinh" value="" readonly><br><br></tr>
            <tr>    
                <th><input type="button" value="&#40" onclick="display('(')"/></th>
                <th><input type="button" value="&#41" onclick="display(')')"/></th>
                <th><input type="button" value="%" onclick="display('%')"/></th>
                <th><input type="button" value="AC" onclick="xoa()"/></th>
            </tr>
            <tr>
                <th><input type="button" value="7" onclick="display('7')"/></th>
                <th><input type="button" value="8" onclick="display('8')"/></th>
                <th><input type="button" value="9" onclick="display('9')"/></th>
                <th><input type="button" value="&#247" onclick="display('/')"/></th>
            </tr>
            <tr>
                <th><input type="button" value="4" onclick="display('4')"/></th>
                <th><input type="button" value="5" onclick="display('5')"/></th>
                <th><input type="button" value="6" onclick="display('6')"/></th>
                <th><input type="button" value="&#215" onclick="display('*')"/></th>
            </tr>
            <tr>
                <th><input type="button" value="1" onclick="display('1')"/></th>
                <th><input type="button" value="2" onclick="display('2')"/></th>
                <th><input type="button" value="3" onclick="display('3')"/></th>
                <th><input type="button" value="&#43" onclick="display('+')"/></th>
            </tr>
            <tr>
                <th><input type="button" value="0" onclick="display('0')"/></th>
                <th><input type="button" value="." onclick="display('.')"/></th>
                <th><input type="button" id="ketqua" value="=" onclick="bang()"/></th>
                <th><input type="button" value="&#8722" onclick="display('-')"/></th>
            </tr>
        </table>
    </form>
    <script>
        const manhinh = document.getElementById('manhinh');
        function display(nhapSo) {
            manhinh.value = manhinh.value + nhapSo;
        }
        function xoa() {
            manhinh.value = '';
        }
        function bang() {
            manhinh.value = eval(manhinh.value);
        }
    </script>
</body>
</html>
