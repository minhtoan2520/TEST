<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đảo ngược phần tử</title>
</head>
<body>
    <script>
        let arr = prompt("Nhập vào phần tử cách nhau bằng dấu phẩy (,)").split(",");
        function daonguocmang(arr){
            for( let i = 0; i < arr.length / 2; i++){
                let temp = arr[i];
                arr[i] = arr[arr.length - 1 - i];
                arr[arr.length - 1 - i] = temp;
            } alert("Sau khi đảo ngược là: " + arr);
        }
        daonguocmang(arr);
    </script>
</body>
</html>
