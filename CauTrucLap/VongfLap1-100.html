<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng lặp đếm từ 1 đến 100</title>
</head>
<body>
    <script>
        for(let i = 1; i < 100; i++){
            setTimeout(() => {
                document.write(i + " ");
                if (i === 99){
                    alert("Đã hoàn thành đếm");
                }
            }, 20 * i);
        }
    </script>
</body>
</html>
