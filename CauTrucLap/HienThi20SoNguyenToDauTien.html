<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20 Số nguyên tố đầu tiên</title>
</head>
<body>
    <script>
        let numbers = parseFloat(prompt("Số lượng số nguyên tố cần xem"));
        let count = 0;
        let n = 2;
        while (count < numbers){
            let nguyento = true;
                for (let i = 2; i < n; i++){
                    if (n % i === 0){
                        nguyento = false;
                        break;
                    } 
                }
                if (nguyento){
                    document.write('Số nguyên tố là ' + n + "<br>");
                     count++;
                }   
                n++
        }
    </script>
</body>
</html>
