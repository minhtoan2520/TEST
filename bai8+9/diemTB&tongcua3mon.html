<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>diemTB&tongcua3mon</title>
</head>
<body>
    <script>
        let ly = Number(prompt('Nhập điểm môn vật lý'));
        let hoa = Number(prompt('Nhập điểm môn hóa học'));
        let sinh = Number(prompt('Nhập điểm môn sinh học'));
        let trungbinh = Math.round((ly + hoa + sinh) / 3);
        let tong3mon = (ly + hoa + sinh);
        alert("Điểm trung bình là " + trungbinh); 
        alert("Tổng điểm của 3 môn là " + tong3mon);
    </script>
</body>
