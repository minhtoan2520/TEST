<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script> 
        let a = Number(prompt("Nhập vào số min"));
        let b = Number(prompt("Nhập vào số max"));
        let random = Math.round(Math.random() * (b - a + 1)) + a;
        alert("Số ngẫu nhiên là " + random)
    </script>
</body>
</html>
