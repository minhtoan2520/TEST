<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>So sánh số bất kỳ với 0</title>
</head>
<body>
    <script>
        let a = Number(prompt('Nhập vào số bất kỳ'));
        let result = (a > 0) 
            ? a + " lớn hơn 0"
            : (a == 0) 
                ? a + " bằng 0"
                : a + " nhỏ hơn 0"
        alert(result);
    </script>
</body>
</html>
