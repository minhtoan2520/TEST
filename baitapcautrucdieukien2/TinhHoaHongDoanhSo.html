<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính hoa hồng nhận được</title>
</head>
<body>
    <script>
        let a = Number(prompt('Nhập vào doanh thu'));
        let b = Number(prompt('Nhập vào % hoa hồng bạn được hưởng'));
        let hoahong = (b / 100) * a;
            alert('Hoa hồng bạn nhận được là ' + hoahong);
    </script>
</body>
</html>
