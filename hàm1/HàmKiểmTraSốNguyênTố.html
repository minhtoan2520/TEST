<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let Number = parseFloat(prompt("Nhập vào 1 số bất kỳ"));
        function isPrime(Number){
            if(Number < 2){
                alert(Number + " Không phải là số nguyên tố");
                return false;
            }
            for(let i = 2; i <= Number; i++){
                if(Number % 2 !== 0){
                    alert(Number + " Là số nguyên tố");
                    return true;
                }else{
                    alert(Number + " Không phải là số nguyên tố");
                }
                return false;
            }
        }
        isPrime(Number);
    </script>
</body>
</html>
