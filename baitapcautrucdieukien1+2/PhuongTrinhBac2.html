<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phương trình bậc 2</title>
</head>
<body>
    <h3>Phương trình bậc 2 (ax² + bx + c = 0) (a ≠ 0) <br> Δ = b² - 4ac</h3>
    <input type="number" id="a" placeholder="Nhập vào số a"/>
    <br><br>
    <input type="number" id="b" placeholder="Nhập vào số b"/>
    <br><br>
    <input type="number" id="c" placeholder="Nhập vào số c"/>
    <br><br>
    <input type="button" onclick="check()" value="Check"/>
    <br>
    <h4 id="kq">Kết quả:</h4>
    <script>
        function check(){
            let a = parseFloat(document.getElementById('a').value);
            let b = parseFloat(document.getElementById('b').value);
            let c = parseFloat(document.getElementById('c').value);
            let kq = "";
            if (isNaN(a) || isNaN(b) || isNaN(c)){
                alert("Kết quả: Vui lòng nhập vào giá trị");
                return;
            } else if (a === 0){
                kq = "Kết quả: Đây không phải phương trình bậc 2";
            } else {
                let delta = (b ** 2) - 4 * a * c;
                if (delta > 0){
                    let x1 = (-b + Math.sqrt(delta)) / (2 * a);
                    let x2 = (-b - Math.sqrt(delta)) / (2 * a);
                        kq = "Kết quả: Phương trình có 2 nghiệm phân biệt: x1 = " + x1.toFixed(2) + " , x2 = " + x2.toFixed(2);
                } else if (delta === 0){
                    let x3 = -b / (2 * a);
                        kq = "Kết quả: Phương trình có nghiệm kép x = " + x3;
                } else{
                    kq = "Kết quả: Phương trình vô nghiệm";
                }
            }
            document.getElementById('kq').innerHTML = kq;
        }
            
    </script>
</body>
</html>
