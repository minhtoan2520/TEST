<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính cước điện thoại</title>
</head>
<body>
    <script>
        let a = Number(prompt('Nhập vào số phút đã sử dụng'));
        let b = Number(prompt('Nhập vào giá cước gọi mỗi phút'));
        let tong = (a * b);
            alert('Tổng cước điện thoại của bạn đã sử dụng là ' + tong + ' VNĐ');
    </script>
</body>
</html>
