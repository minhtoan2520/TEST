<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xếp loại học lực</title>
</head>
<body>
    <script>
        let kt = Number(prompt('Nhập vào điểm bài kiểm tra'));
        let gk = Number(prompt('Nhập vào điểm thi giữa kỳ'));
        let ck = Number(prompt('Nhập vào điểm thi cuối kỳ'));
        let tb = (kt + gk + ck) / 3;
        let result = (tb >= 8) 
            ? "Bạn đạt học sinh giỏi"
            : (tb >= 6.5)
                ? "Bạn đạt học sinh khá"
                : (tb >= 5) 
                    ?"Bạn đạt học sinh trung bình"
                    : "Học sinh yếu, bạn cần cố gắng hơn";
        alert(result);
    </script>
</body>
</html>
