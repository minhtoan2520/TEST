<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diện tích tam giác vuông</title>
</head>
<body>
    <input type="number" id="a" placeholder="Nhập vào cạnh a"/> Đơn vị: cm 
    <br><br>
    <input type="number" id="b" placeholder="Nhập vào cạnh b"/> Đơn vị: cm 
    <br><br>
    <input type="button" onclick="tinh()" value="Tính"/>
    <h4 id="kq">Kết quả:</h4>
    <script>
        function tinh(){
            let a = parseFloat(document.getElementById('a').value);
            let b = parseFloat(document.getElementById('b').value);
            if (!a || !b){
                alert('Vui lòng nhập vào giá trị');
                return;

            }
            let s = (a * b) / 2;
            document.getElementById('kq').innerHTML = "Kết quả: Diện tích hình tam giác vuông là " + s + " cm"
        }
    </script>
</body>
</html>
