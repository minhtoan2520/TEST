<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyển độ C sang độ F</title>
</head>
<body>
    <script>
        let a = parseFloat(prompt("Nhập vào nhiệt độ (°C)"));
        let c = a * 9 / 5 + 32;
        alert(c + " °F");
    </script>
</body>
</html>
