<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra xem đủ tuổi vào lớp 10?</title>
</head>
<body>
    <script>
        let a = Number(prompt('Nhập vào tuổi của bạn'));
        let result = (a < 14) ? " Bạn chưa đủ tuổi vào lớp 10" : "Bạn đủ tuổi vào lớp 10"
        alert(result);
    </script>
</body>
</html>
