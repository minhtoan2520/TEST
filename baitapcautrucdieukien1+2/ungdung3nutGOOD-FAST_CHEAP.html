<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3nutGood-Fast-Cheap</title>
</head>
<style>
    body {
        font-family: Arial;
        
    }
    .switch {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 24px;
        
    }
    .switch input {
        display: none;
    }
    .slider {
        position: absolute;
        background-color: #eb1515;
        border-radius: 25px;
        cursor: pointer;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
    }
    .slider::before {
        content: "";
        position: absolute;
        background-color: white;
        border-radius: 50%;
        height: 20px;
        width: 20px;
        left: 3px;
        bottom: 2px;
        transition: 0.3s;
    }
    input:checked + .slider {
        background-color: rgb(9, 255, 0);
    }
    input:checked + .slider::before {
        transform: translateX(24px);
    }
    .x {
        position: absolute;
        margin-top: 3px;
        margin-left: 5px;
        color: rgb(96, 18, 221);
    }
</style>
<body>
    <label class="switch">
        <input onclick="check('good')" type="checkbox" id="good"/>
        <span class="slider"></span>
    </label>
    <a class="x">Good</a><br>
    <label class="switch">
        <input onclick="check('fast')" type="checkbox" id="fast"/>
        <span class="slider"></span>
    </label>
    <a class="x">Fast</a><br>
    <label class="switch">
        <input onclick="check('cheap')" type="checkbox" id="cheap" />
        <span class="slider"></span>
    </label>
    <a class="x">Cheap</a><br>
    <script>
        function check(status){
            let good = document.getElementById("good");
            let fast = document.getElementById("fast");
            let cheap = document.getElementById("cheap");

            switch(status){
                case "good":
                    if(good.checked )
                        fast.checked = false;
                    break;
                case "fast":
                    if(fast.checked )
                        cheap.checked = false;
                    break;
                case "cheap":
                    if(cheap.checked )
                        good.checked = false;
                    break;
            }
        }
    </script>
</body>
</html>
