<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function cacso(){
            let count = 1;
            while (count <= 100){
                if(count % 3 == 0 && count % 5 == 0){
                    document.write('fizzbuzz' + '<br>');
                } else if(count % 3 == 0){
                    document.write('fizz' + '<br>');
                } else if(count % 5 == 0){
                    document.write('buzz' + '<br>');
                } else{
                    document.write(count + '<br>');
                } 
                count++;
            }
        }
        cacso();
    </script>
</body>
</html>
