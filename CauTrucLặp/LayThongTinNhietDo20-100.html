<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhiệt độ từ 20-100</title>
</head>
<body>
    <script>
        let i = parseFloat(prompt("Nhập vào nhiệt độ"));
            if (i < 20){
                alert("Vui lòng nhập nhiệt độ cao hơn!");
            } else if (i > 100){
                alert("Vui lòng nhập nhiệt độ thấp hơn!");
            } else {
                alert("Nhiệt độ bạn nhập là: " + i);
            }  
    </script>
</body>
</html>
