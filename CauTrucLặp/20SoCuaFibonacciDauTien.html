<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20 Số của dãy Fibonacci đầu tiên</title>
</head>
<body>
    <script>
        function nhieuso(number){    
            let count = 0;
            let a = 0;
            let b = 1;
            while(count < number){
                document.write(a + ", ");
                let fibo = a + b;
                a = b;
                b = fibo;
                count++;   
            } 
        }
        nhieuso(20); 
    </script>
</body>
</html>
